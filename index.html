<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--p:#1a7a8a;--pl:#e6f4f7;--a:#c8a84b;--bg:#f0f3f7;--card:#fff;--t:#2c3e50;--tl:#8a9ab0;--b:#e0e6ed;--ok:#27ae60;--err:#e74c3c;--sh:0 2px 10px rgba(0,0,0,.07)}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t)}
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--bg);position:relative;overflow:hidden}
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);display:none;flex-direction:column}
.page.active{display:flex}
.ph{background:linear-gradient(135deg,#1a7a8a,#115e6b);color:#fff;flex-shrink:0}
.ph-inner{padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between}
.ph h1{font-size:18px;font-weight:700}
.ph .sub{font-size:11px;opacity:.75;margin-top:1px}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tabs{display:flex;background:#fff;border-top:1px solid var(--b);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 2px 8px;cursor:pointer;border:none;background:none;color:var(--tl);font-size:9.5px;font-weight:500;gap:3px;transition:.15s;-webkit-user-select:none}
.tab svg{width:22px;height:22px;stroke-width:1.8}
.tab.active{color:var(--p)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:9px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:.15s;-webkit-user-select:none;white-space:nowrap}
.btn-p{background:var(--p);color:#fff}.btn-p:active{opacity:.85}
.btn-sec{background:var(--pl);color:var(--p)}
.btn-err{background:#fdecea;color:var(--err)}
.btn-sm{padding:7px 13px;font-size:12px;border-radius:7px}
.btn-xs{padding:4px 10px;font-size:11px;border-radius:6px}
.btn-full{width:100%}
.btn-ghost{background:none;border:1.5px solid var(--b);color:var(--t)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:480px;max-height:92vh;display:flex;flex-direction:column}
.mdrag{width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 2px}
.mhead{padding:10px 18px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mtitle{font-size:17px;font-weight:700}
.mclose{background:none;border:none;font-size:26px;cursor:pointer;color:var(--tl);line-height:1;padding:2px 6px}
.mbody{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 18px 16px;flex:1}
.mfooter{padding:12px 18px 18px;border-top:1px solid var(--b);flex-shrink:0;display:flex;gap:8px}
.fg{margin-bottom:14px}
.fl{font-size:12px;font-weight:600;color:var(--tl);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.3px}
.fc{width:100%;padding:10px 13px;border:1.5px solid var(--b);border-radius:9px;font-size:15px;outline:none;transition:.2s;background:#fff;color:var(--t);-webkit-appearance:none}
.fc:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(26,122,138,.1)}
textarea.fc{resize:none;min-height:75px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.tg-grp{display:flex;gap:7px;margin-top:5px}
.tg-btn{flex:1;padding:9px 6px;border:1.5px solid var(--b);border-radius:8px;background:#fff;cursor:pointer;font-size:13px;text-align:center;transition:.15s;font-weight:500;-webkit-user-select:none}
.tg-btn.yes{border-color:var(--ok);background:#eafaf1;color:#1a7a4a}
.tg-btn.no{border-color:var(--b);background:#f8f9fa;color:var(--tl)}
.sbar{padding:10px 14px;background:#fff;border-bottom:1px solid var(--b);display:flex;gap:8px;align-items:center;flex-shrink:0;position:sticky;top:0;z-index:10}
.si{flex:1;padding:8px 13px;border:1.5px solid var(--b);border-radius:20px;font-size:14px;outline:none;background:#f8f9fa;-webkit-appearance:none}
.si:focus{border-color:var(--p);background:#fff}
.pi{display:flex;align-items:center;padding:13px 14px;border-bottom:1px solid var(--b);cursor:pointer;background:#fff;-webkit-user-select:none}
.pi:active{background:var(--pl)}
.av{width:42px;height:42px;border-radius:50%;background:var(--pl);color:var(--p);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0;margin-right:12px}
.av.f{background:#fde8f0;color:#c0446e}
.pname{font-size:15px;font-weight:600}
.psub{font-size:12px;color:var(--tl);margin-top:2px}
.cal-top{background:linear-gradient(135deg,#1a7a8a,#115e6b);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cal-nav-btn{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;-webkit-user-select:none}
.cal-nav-btn:active{background:rgba(255,255,255,.35)}
.cal-title{color:#fff;font-size:16px;font-weight:700;flex:1;text-align:center;margin:0 8px}
.cvb{display:flex;background:rgba(255,255,255,.15);border-radius:8px;overflow:hidden}
.cvbtn{padding:6px 12px;border:none;background:transparent;font-size:12px;cursor:pointer;color:rgba(255,255,255,.8);font-weight:500;-webkit-user-select:none}
.cvbtn.active{background:rgba(255,255,255,.9);color:var(--p)}
.cal-wd{display:grid;grid-template-columns:repeat(7,1fr);background:rgba(26,94,107,.85);flex-shrink:0}
.cal-wdc{color:rgba(255,255,255,.85);text-align:center;padding:7px 2px;font-size:10.5px;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--b)}
.cal-day{background:#fff;min-height:60px;padding:4px;cursor:pointer;-webkit-user-select:none;transition:.1s}
.cal-day:active{background:var(--pl)}
.cal-dn{font-size:13px;font-weight:600;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cal-day.today .cal-dn{background:var(--p);color:#fff}
.cal-day.om .cal-dn{color:#ccc}
.cal-evs{margin-top:2px;display:flex;flex-direction:column;gap:1.5px}
.cal-ev{font-size:9px;padding:1px 4px;border-radius:3px;background:var(--p);color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wv-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.wv-head{display:grid;grid-template-columns:44px repeat(7,1fr);background:linear-gradient(135deg,#1a7a8a,#115e6b);color:#fff;position:sticky;top:0;z-index:5;flex-shrink:0}
.wv-hc{text-align:center;padding:8px 2px;font-size:10.5px}
.wv-hc.tc{background:rgba(255,255,255,.15);font-weight:700}
.wv-row{display:grid;grid-template-columns:44px repeat(7,1fr);border-bottom:1px solid var(--b);min-height:54px}
.wv-time{font-size:10px;color:var(--tl);padding:4px 4px 0 4px;text-align:right;align-self:flex-start}
.wv-cell{border-left:1px solid var(--b);padding:2px;cursor:pointer;min-height:54px}
.wv-cell:active{background:var(--pl)}
.wv-ev{font-size:9px;padding:2px 4px;background:var(--p);color:#fff;border-radius:3px;margin:1px 0;cursor:pointer}
.dv-head{background:linear-gradient(135deg,#1a7a8a,#115e6b);color:#fff;padding:10px 14px;font-size:14px;font-weight:700;text-align:center;flex-shrink:0}
.dv-row{display:grid;grid-template-columns:46px 1fr;border-bottom:1px solid var(--b);min-height:62px;cursor:pointer}
.dv-row:active{background:var(--pl)}
.dv-t{font-size:11px;color:var(--tl);padding:8px 6px 0 8px;text-align:right;align-self:flex-start}
.dv-slot{padding:4px 10px;border-left:2px solid var(--b)}
.dv-ev{background:var(--p);color:#fff;border-radius:7px;padding:7px 10px;margin:3px 0}
.dv-ev-name{font-size:13px;font-weight:600}
.dv-ev-note{font-size:11px;opacity:.8;margin-top:2px}
.seg{display:flex;background:var(--pl);border-radius:10px;padding:3px;gap:2px;margin:10px 14px;flex-shrink:0}
.sbtn{flex:1;padding:9px 8px;border:none;background:transparent;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;color:var(--p);transition:.15s;-webkit-user-select:none}
.sbtn.active{background:#fff;box-shadow:0 1px 5px rgba(0,0,0,.1)}
.acc-item{margin:8px 14px;border-radius:12px;overflow:hidden;box-shadow:var(--sh);background:#fff}
.acc-head{display:flex;align-items:center;padding:14px 15px;cursor:pointer;-webkit-user-select:none;background:#fff}
.acc-head:active{background:var(--pl)}
.acc-icon{width:34px;height:34px;border-radius:9px;background:var(--pl);color:var(--p);display:flex;align-items:center;justify-content:center;margin-right:12px;flex-shrink:0;font-size:18px}
.acc-title{flex:1;font-size:15px;font-weight:700}
.acc-arrow{transition:.2s;color:var(--tl);font-size:14px}
.acc-arrow.open{transform:rotate(180deg)}
.acc-body{display:none;border-top:1px solid var(--b)}
.acc-body.open{display:block}
.acc-sub{display:flex;align-items:center;padding:12px 15px 12px 28px;border-bottom:1px solid var(--b);cursor:pointer;-webkit-user-select:none;gap:10px}
.acc-sub:last-child{border-bottom:none}
.acc-sub:active{background:var(--pl)}
.acc-sub-name{flex:1;font-size:14px}
.rp-item{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--b);background:#fff;gap:8px}
.rp-date{font-size:11px;color:var(--tl);width:66px;flex-shrink:0}
.rp-proc{flex:1;font-size:13px;font-weight:600;line-height:1.3}
.rp-name{font-size:12px;color:var(--p);cursor:pointer;text-decoration:underline;text-underline-offset:2px}
.pr-box{background:linear-gradient(135deg,var(--p),#115e6b);color:#fff;border-radius:14px;padding:18px;margin:12px 14px;text-align:center}
.pr-amount{font-size:30px;font-weight:800}
.pr-label{font-size:12px;opacity:.8;margin-top:4px}
.proc-pick-cat{display:flex;align-items:center;justify-content:space-between;padding:14px 14px;border-bottom:1px solid var(--b);cursor:pointer;background:#fff;font-size:15px;font-weight:600;-webkit-user-select:none}
.proc-pick-cat:active{background:var(--pl)}
.proc-pick-cat .ppc-arrow{transition:transform .2s;flex-shrink:0;color:var(--tl)}
.proc-pick-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 12px 28px;border-bottom:1px solid var(--b);cursor:pointer;background:#f8fafc;-webkit-user-select:none}
.proc-pick-item:active{background:var(--pl)}
.proc-pick-item .pps-arrow{transition:transform .2s;flex-shrink:0;color:var(--tl)}
.proc-pick-prod{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 10px 44px;border-bottom:1px solid var(--b);cursor:pointer;background:#eef4fb;font-size:14px;color:var(--t);-webkit-user-select:none}
.proc-pick-prod:active{background:var(--pl)}
.pr-row{display:flex;align-items:center;gap:8px;padding:10px 15px;border-bottom:1px solid var(--b)}
.pr-pname{flex:1;font-size:14px}
.pr-qty{width:65px;padding:6px 8px;border:1.5px solid var(--b);border-radius:7px;font-size:14px;text-align:right;background:#fff;outline:none}
.pr-qty:focus{border-color:var(--p)}
.pr-unit{font-size:12px;color:var(--tl);width:28px;text-align:center}
.utg{display:flex;border:1.5px solid var(--b);border-radius:7px;overflow:hidden;flex-shrink:0}
.utg-btn{padding:5px 9px;border:none;background:#fff;font-size:11px;cursor:pointer;color:var(--tl);font-weight:500;-webkit-user-select:none;transition:.15s}
.utg-btn.sel{background:var(--p);color:#fff}
.pr-price-inline{font-size:13px;font-weight:700;color:var(--p);min-width:52px;text-align:right;flex-shrink:0}
.pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;flex:1}
.pin-dots{display:flex;gap:14px;margin-bottom:28px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--p);background:transparent;transition:.15s}
.pin-dot.filled{background:var(--p)}
.pin-kp{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;width:100%}
.pin-k{padding:16px 10px;background:#fff;border:1.5px solid var(--b);border-radius:12px;font-size:22px;font-weight:600;cursor:pointer;text-align:center;box-shadow:var(--sh);-webkit-user-select:none;color:var(--t)}
.pin-k:active{background:var(--pl);border-color:var(--p)}
.euro-bar{padding:12px 14px;background:#fff;border-bottom:1px solid var(--b);display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.ebox{display:flex;align-items:center;gap:7px;background:#e8f6e8;padding:8px 12px;border-radius:9px}
.lbox{display:flex;align-items:center;gap:7px;background:#fff8e1;padding:8px 12px;border-radius:9px;flex:1}
.elbl{font-size:11px;color:var(--tl);font-weight:600;white-space:nowrap}
.eval{font-size:16px;font-weight:800;color:#1a7a4a}
.ein{width:72px;border:1.5px solid #f0c040;border-radius:7px;padding:4px 8px;font-size:14px;text-align:right;background:#fff;outline:none;color:var(--t)}
.lresult{font-size:14px;font-weight:700;color:#a07800}
.ci{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--b);gap:8px}
.ci-name{flex:1;font-size:14px}
.ci-unit{padding:5px 7px;border:1.5px solid var(--b);border-radius:7px;font-size:12px;background:#fff;min-width:54px;outline:none;-webkit-appearance:none}
.ci-price{width:82px;padding:6px 8px;border:1.5px solid var(--b);border-radius:7px;font-size:13px;text-align:right;background:#fff;outline:none}
.ci-del{background:none;border:none;color:var(--err);font-size:18px;cursor:pointer;padding:4px;-webkit-user-select:none}
.il{padding:10px 14px;border-bottom:1px solid var(--b);display:flex;align-items:flex-start}
.il-lbl{font-size:12.5px;color:var(--tl);width:130px;flex-shrink:0;padding-top:1px}
.il-val{font-size:14px;font-weight:500;flex:1;line-height:1.4}
.popup{position:fixed;background:#fff;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.22);overflow:hidden;z-index:400;min-width:190px}
.popup-item{padding:14px 18px;border-bottom:1px solid var(--b);cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;-webkit-user-select:none}
.popup-item:last-child{border-bottom:none}
.popup-item:active{background:var(--pl)}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:rgba(30,40,55,.9);color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;z-index:600;opacity:0;transition:.3s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1}
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;background:var(--pl);color:var(--p);font-size:12px;font-weight:600;margin:2px}
.tag.warn{background:#fff8e1;color:#a07800}
.tag.ok{background:#eafaf1;color:#1a7a4a}
.tag.err{background:#fdecea;color:var(--err)}
.appt-chip{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--b);gap:10px;background:#fff;cursor:pointer;-webkit-user-select:none}
.appt-chip:active{background:var(--pl)}
.appt-time{font-size:14px;font-weight:700;color:var(--p);width:50px;text-align:center;flex-shrink:0}
.appt-dot{width:8px;height:8px;border-radius:50%;background:var(--p);flex-shrink:0}
.appt-info{flex:1}
.appt-name{font-size:14px;font-weight:600}
.appt-note{font-size:12px;color:var(--tl);margin-top:1px}
.divider{height:8px;background:var(--bg);flex-shrink:0}
.sec-lbl{padding:14px 14px 6px;font-size:11px;font-weight:700;color:var(--tl);text-transform:uppercase;letter-spacing:.7px;flex-shrink:0}
.empty{text-align:center;padding:48px 20px;color:var(--tl)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px}
.fab-area{padding:12px 14px;background:#fff;border-top:1px solid var(--b);flex-shrink:0}
.proc-chip{display:flex;align-items:center;padding:8px 12px;gap:8px;background:var(--pl);border-radius:8px;margin-bottom:6px}
.proc-chip-name{flex:1;font-size:13px;font-weight:600;color:var(--p)}
.chip-del{background:none;border:none;color:var(--err);font-size:16px;cursor:pointer}
.hist-item{padding:12px 14px;border-bottom:1px solid var(--b);cursor:pointer;background:#fff}
.hist-item:active{background:var(--pl)}
.hist-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.hist-proc{font-size:14px;font-weight:600}
.hist-price{font-size:14px;font-weight:700;color:var(--p)}
.hist-date{font-size:12px;color:var(--tl)}
.sarf-cost-box{background:linear-gradient(135deg,#1a7a8a,#115e6b);color:#fff;border-radius:12px;margin:14px;padding:14px;display:flex;align-items:center;justify-content:space-between}
.sarf-cost-lbl{font-size:13px;opacity:.85}
.sarf-cost-in{width:100px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:8px;padding:6px 10px;font-size:16px;font-weight:700;color:#fff;text-align:right;outline:none}
</style>
</head>
<body>
<div id="app">
<div class="pages">

<!-- ====== TAB 1: AJANDA ====== -->
<div id="page-ajanda" class="page active">
  <div class="cal-top">
    <button class="cal-nav-btn" onclick="calNav(-1)">&#8249;</button>
    <div class="cal-title" id="cal-title"></div>
    <button class="cal-nav-btn" onclick="calNav(1)">&#8250;</button>
    <div class="cvb" style="margin-left:8px">
      <button class="cvbtn active" onclick="setCalView('month',this)">Ay</button>
      <button class="cvbtn" onclick="setCalView('week',this)">Hafta</button>
      <button class="cvbtn" onclick="setCalView('day',this)">Gün</button>
    </div>
  </div>
  <div class="cal-wd" id="cal-wd"></div>
  <div class="scroll" id="cal-body" style="flex:1"></div>
  <div class="fab-area">
    <button class="btn btn-p btn-full" onclick="openApptModal()">+ Randevu Ekle</button>
  </div>
</div>

<!-- ====== TAB 2: HASTALAR ====== -->
<div id="page-hastalar" class="page">
  <div class="ph">
    <div class="ph-inner">
      <div><h1>Hastalar</h1><div class="sub" id="patient-count"></div></div>
      <button class="btn btn-sm" style="background:rgba(255,255,255,.2);color:#fff" onclick="showSortMenu(event)">Sırala ▾</button>

function setSyncStatus(s){
  const el=document.getElementById('sync-dot');
  if(!el) return;
  el.style.background=s==='ok'?'#2ecc71':s==='syncing'?'#f39c12':'#e74c3c';
  el.title=s==='ok'?'Senkronize':s==='syncing'?'Senkronize ediliyor...':'Bağlantı hatası';
}

// Dizi verilerini id'ye göre birleştirir (local + remote union)
function mergeArr(local,remote){
  if(!remote||!remote.length) return local; // Remote boşsa locali koru
  if(!local||!local.length) return remote;  // Local boşsa remoteden al
  const map={};
  local.forEach(item=>{if(item&&item.id) map[item.id]=item;});
  remote.forEach(item=>{if(item&&item.id) map[item.id]=item;}); // Remote çakışmada kazanır
  return Object.values(map);
}

async function syncFromSupabase(){
  setSyncStatus('syncing');
  try{
    const {data,error}=await sb.from('app_data').select('key,value');
    if(error) throw error;
    // Supabase boşsa: local veriyi Supabase'e yükle (ilk bağlantı senaryosu)
    if(!data||!data.length){
      setSyncStatus('ok');
      saveToSupabase(SB_KEYS);
      return false;
    }
    const sbMap={};
    data.forEach(row=>sbMap[row.key]=row.value);
    let changed=false;
    // Dizi türleri: local + remote birleştir, veri kaybı olmasın
    ['patients','appointments','procedures'].forEach(k=>{
      const merged=mergeArr(db[k]||[],sbMap[k]||[]);
      if(JSON.stringify(merged)!==JSON.stringify(db[k])){db[k]=merged;changed=true;}
    });
    // Ürün/sarf/cats: remote doluysa al, boşsa locali koru
    ['products','consumables','cats'].forEach(k=>{
      const remote=sbMap[k];
      if(remote&&remote.length>0){
        if(JSON.stringify(remote)!==JSON.stringify(db[k])){db[k]=remote;changed=true;}
      }
    });
    // Ayarlar ve fiyat şablonları: remote varsa al
    if(sbMap['settings']&&Object.keys(sbMap['settings']).length){db.settings=sbMap['settings'];changed=true;}
    if(sbMap['fiyatTemplates']){db.fiyatTemplates=sbMap['fiyatTemplates']||{};changed=true;}
    // Birleştirilmiş veriyi localStorage'a kaydet
    SB_KEYS.forEach(k=>{
      try{localStorage.setItem(k==='fiyatTemplates'?'ek_fiyat':'ek_'+k,JSON.stringify(k==='fiyatTemplates'?db.fiyatTemplates:db[k]));}catch(e){}
    });
    db.cats.forEach(c=>{if(c.direct===undefined)c.direct=c.subs.length===0;});
    // Birleştirilmiş veriyi Supabase'e geri yaz (eksik verileri tamamla)
    saveToSupabase(SB_KEYS);
    setSyncStatus('ok');
    return changed;
  }catch(e){setSyncStatus('err');return false;}
}

async function saveToSupabase(keys){
  setSyncStatus('syncing');
  try{
    const rows=(keys&&keys.length?keys:SB_KEYS).map(k=>({
      key:k,
      value:k==='fiyatTemplates'?db.fiyatTemplates:db[k],
      updated_at:new Date().toISOString()
    }));
    const {error}=await sb.from('app_data').upsert(rows,{onConflict:'key'});
    if(error) throw error;
    setSyncStatus('ok');
  }catch(e){setSyncStatus('err');}
}

let calDate=new Date();
let calView='month';
let calSelectedDate=null;

function calNav(dir){
  if(calView==='month'){calDate.setMonth(calDate.getMonth()+dir);}
  else if(calView==='week'){calDate.setDate(calDate.getDate()+(dir*7));}
  else{calDate.setDate(calDate.getDate()+dir);}
  renderCalendar();
}

function setCalView(v,btn){
  calView=v;
  document.querySelectorAll('.cvbtn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderCalendar();
}

function renderCalendar(){
  if(calView==='month') renderMonthView();
  else if(calView==='week') renderWeekView();
  else renderDayView();
}

const TR_MONTHS=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const TR_DAYS=['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
const TR_DAYS_SHORT=['P','S','Ç','P','C','C','P'];
const TR_MONTHS_SHORT=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];

function dateStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

function renderMonthView(){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  const today=new Date();
  document.getElementById('cal-title').textContent=TR_MONTHS[m]+' '+y;
  document.getElementById('cal-wd').innerHTML=TR_DAYS.map(d=>`<div class="cal-wdc">${d}</div>`).join('');
  document.getElementById('cal-wd').style.display='grid';

  const firstDay=new Date(y,m,1);
  const lastDay=new Date(y,m+1,0);
  let startDow=firstDay.getDay();
  if(startDow===0) startDow=7;
  startDow--;

  let html='<div class="cal-grid">';
  const prevLast=new Date(y,m,0).getDate();
  for(let i=startDow-1;i>=0;i--) html+=`<div class="cal-day om"><div class="cal-dn">${prevLast-i}</div></div>`;

  for(let d=1;d<=lastDay.getDate();d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=y===today.getFullYear()&&m===today.getMonth()&&d===today.getDate();
    const appts=db.appointments.filter(a=>a.date===ds);
    html+=`<div class="cal-day${isToday?' today':''}" onclick="openDayModal('${ds}')">`;
    html+=`<div class="cal-dn">${d}</div>`;
    if(appts.length){
      html+='<div class="cal-evs">';
      appts.slice(0,2).forEach(a=>{html+=`<div class="cal-ev">${a.time} ${(a.patientName||'').split(' ')[0]}</div>`;});
      if(appts.length>2) html+=`<div class="cal-ev" style="background:var(--a)">+${appts.length-2}</div>`;
      html+='</div>';
    }
    html+='</div>';
  }
  const total=startDow+lastDay.getDate();
  const rem=total%7===0?0:7-(total%7);
  for(let d=1;d<=rem;d++) html+=`<div class="cal-day om"><div class="cal-dn">${d}</div></div>`;
  html+='</div>';
  document.getElementById('cal-body').innerHTML=html;
}

function renderWeekView(){
  const today=new Date();
  // Find Monday of current week
  const d=new Date(calDate);
  const dow=d.getDay()===0?7:d.getDay();
  d.setDate(d.getDate()-(dow-1));
  const weekStart=new Date(d);

  document.getElementById('cal-wd').innerHTML='';
  document.getElementById('cal-wd').style.display='none';

  const days=[];
  for(let i=0;i<7;i++){
    const dd=new Date(weekStart);
    dd.setDate(weekStart.getDate()+i);
    days.push(dd);
  }

  const startStr=`${TR_MONTHS_SHORT[weekStart.getMonth()]} ${weekStart.getDate()}`;
  const endDate=days[6];
  document.getElementById('cal-title').textContent=startStr+' – '+endDate.getDate()+' '+TR_MONTHS_SHORT[endDate.getMonth()]+' '+endDate.getFullYear();

  let html='<div style="flex:1;overflow-y:auto">';
  // Header
  html+='<div class="wv-head"><div class="wv-hc"></div>';
  days.forEach((dd,i)=>{
    const isT=dateStr(dd)===dateStr(today);
    html+=`<div class="wv-hc${isT?' tc':''}">${TR_DAYS[i]}<br>${dd.getDate()}</div>`;
  });
  html+='</div>';

  // Time rows 7:00-21:00
  for(let h=7;h<=21;h++){
    html+=`<div class="wv-row"><div class="wv-time">${h}:00</div>`;
    days.forEach(dd=>{
      const ds=dateStr(dd);
      const slotAppts=db.appointments.filter(a=>a.date===ds&&parseInt(a.time)===h);
      html+=`<div class="wv-cell" onclick="openApptForSlot('${ds}','${String(h).padStart(2,'0')}:00')">`;
      slotAppts.forEach(a=>{html+=`<div class="wv-ev" onclick="event.stopPropagation();editAppt('${a.id}')">${a.time} ${(a.patientName||'').split(' ')[0]}</div>`;});
      html+='</div>';
    });
    html+='</div>';
  }
  html+='</div>';
  document.getElementById('cal-body').innerHTML=html;
}

function renderDayView(){
  const today=new Date();
  document.getElementById('cal-wd').innerHTML='';
  document.getElementById('cal-wd').style.display='none';
  const ds=dateStr(calDate);
  const isToday=ds===dateStr(today);
  const dayName=TR_DAYS[(calDate.getDay()===0?7:calDate.getDay())-1];
  document.getElementById('cal-title').textContent=`${dayName}, ${calDate.getDate()} ${TR_MONTHS[calDate.getMonth()]}`;

  let html=`<div style="flex:1;overflow-y:auto">`;
  for(let h=7;h<=21;h++){
    const slotAppts=db.appointments.filter(a=>a.date===ds&&parseInt(a.time)===h);
    html+=`<div class="dv-row" onclick="openApptForSlot('${ds}','${String(h).padStart(2,'0')}:00')">`;
    html+=`<div class="dv-t">${h}:00</div>`;
    html+='<div class="dv-slot">';
    slotAppts.forEach(a=>{
      html+=`<div class="dv-ev" onclick="event.stopPropagation();editAppt('${a.id}')">`;
      html+=`<div class="dv-ev-name">${a.time} – ${a.patientName||'İsimsiz'}</div>`;
      if(a.notes) html+=`<div class="dv-ev-note">${a.notes}</div>`;
      html+='</div>';
    });
    html+='</div></div>';
  }
  html+='</div>';
  document.getElementById('cal-body').innerHTML=html;
}

function openDayModal(ds){
  calSelectedDate=ds;
  const appts=db.appointments.filter(a=>a.date===ds).sort((a,b)=>a.time.localeCompare(b.time));
  const d=new Date(ds+'T12:00:00');
  const dayName=TR_DAYS[(d.getDay()===0?7:d.getDay())-1];
  document.getElementById('day-modal-title').textContent=`${dayName}, ${d.getDate()} ${TR_MONTHS[d.getMonth()]}`;
  document.getElementById('day-add-btn').onclick=()=>{closeModal('ov-day');openApptForSlot(ds,'09:00');};
  let html='';
  if(!appts.length){
    html='<div class="empty"><div class="empty-icon">📅</div><p>Bu gün randevu yok</p></div>';
  } else {
    appts.forEach(a=>{
      html+=`<div class="appt-chip" onclick="editAppt('${a.id}')">`;
      html+=`<div class="appt-time">${a.time}</div>`;
      html+=`<div class="appt-dot"></div>`;

      if(a.notes) html+=`<div class="appt-note">${a.notes}</div>`;
      html+='</div></div>';
    });
  }
  document.getElementById('day-modal-body').innerHTML=html;
  openModal('ov-day');
}

  const names=[];
  db.cats.forEach(cat=>{
    if(cat.subs&&cat.subs.length) cat.subs.forEach(s=>names.push(s));
    else names.push(cat.name);
  });

}

  if(!a) return;
  document.getElementById('appt-edit-id').value=id;
  document.getElementById('appt-modal-title').textContent='Randevu Düzenle';
  document.getElementById('appt-patient').value=a.patientName||'';
  document.getElementById('appt-proc').value=a.procedure||'';
  document.getElementById('appt-date').value=a.date;
  document.getElementById('appt-time').value=a.time;
  document.getElementById('appt-note').value=a.notes||'';
  document.getElementById('appt-del-btn').style.display='flex';
  fillApptProcDatalist();
  closeModal('ov-day');
  openModal('ov-appt');
}

let patientSort='name';

function renderPatients(list){
  const pts=list||getFilteredPatients();
  document.getElementById('patient-count').textContent=pts.length+' hasta';
  if(!pts.length){
    document.getElementById('patient-list').innerHTML='<div class="empty"><div class="empty-icon">👤</div><p>Henüz hasta kaydı yok</p></div>';
    return;
  }
  document.getElementById('patient-list').innerHTML=pts.map(p=>{
    const initials=p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const lastProc=getLastProcDate(p.id);
    const avatar=p.photo
      ?`<img src="${p.photo}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0">`
      :`<div class="av${p.gender==='K'?' f':''}">${initials}</div>`;
    return `<div class="pi" onclick="showPatientMenu(event,'${p.id}')">
      ${avatar}
      <div style="flex:1">
        <div class="pname">${p.name}</div>
        <div class="psub">${lastProc?'Son işlem: '+formatDate(lastProc):'Kayıt: '+formatDate(p.createdAt)}</div>
      </div>
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#ccc" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </div>`;
  }).join('');
}

function getFilteredPatients(){
  let pts=[...db.patients];
  if(patientSearch) pts=pts.filter(p=>p.name.toLowerCase().includes(patientSearch.toLowerCase()));
  if(patientSort==='name') pts.sort((a,b)=>a.name.localeCompare(b.name,'tr'));
  else pts.sort((a,b)=>{
    const la=getLastProcDate(a.id)||a.createdAt||'';
    const lb=getLastProcDate(b.id)||b.createdAt||'';
    return lb.localeCompare(la);
  });
  return pts;
}

function getLastProcDate(pid){
  const procs=db.procedures.filter(p=>p.patientId===pid);
  if(!procs.length) return null;
  return procs.sort((a,b)=>b.date.localeCompare(a.date))[0].date;
}

function handleNpPhoto(input){
  const file=input.files[0];
  if(!file) return;
  const img=new Image();
  const url=URL.createObjectURL(file);
  img.onload=()=>{
    const canvas=document.createElement('canvas');
    const size=300;
    canvas.width=size; canvas.height=size;
    const ctx=canvas.getContext('2d');
    const aspect=img.width/img.height;
    let sx=0,sy=0,sw=img.width,sh=img.height;
    if(aspect>1){sx=(img.width-img.height)/2;sw=sh;}
    else if(aspect<1){sy=(img.height-img.width)/2;sh=sw;}
    ctx.drawImage(img,sx,sy,sw,sh,0,0,size,size);
    const b64=canvas.toDataURL('image/jpeg',0.75);
    document.getElementById('np-photo-img').src=b64;
    document.getElementById('np-photo-preview').style.display='flex';
    document.getElementById('np-photo-btn').textContent='📷 Fotoğrafı Değiştir';
    URL.revokeObjectURL(url);
  };
  img.src=url;
}

function getProcDisplayLabel(proc){
  const cat=db.cats.find(c=>c.id===proc.typeId);
  const catName=cat?cat.name:'';
  const isDirect=cat?isCatDirect(cat):false;
  const prodPart=proc.products&&proc.products.length
    ?proc.products.map(p=>p.name).join(', ')
    :(isDirect&&proc.typeName?proc.typeName:'');
  const subPart=(!isDirect&&proc.typeName&&proc.typeName!==catName)?proc.typeName:'';
  const parts=[prodPart,subPart,catName].filter(Boolean);
  return parts.length?parts.join(' '):(proc.typeName||proc.typeId||'—');
}

function isCatDirect(cat){return cat.direct!==undefined?cat.direct:cat.subs.length===0;}

function renderGenelIslemler(){
  const el=document.getElementById('islem-genel');
  let html='<div style="padding:10px 14px 4px;font-size:13px;color:var(--tl)">İşlem seçerek seans fiyatını hesaplayın ve kaydedin.</div>';
  html+='<div style="padding-bottom:20px">';
  db.cats.forEach(cat=>{
    html+=`<div class="acc-item">
      <div class="acc-head" onclick="toggleAcc(this)">
        <div class="acc-icon">${cat.icon}</div>
        <div class="acc-title">${cat.name}</div>
        <div class="acc-arrow">▼</div>
      </div>
      <div class="acc-body">`;
    if(isCatDirect(cat)){
      const prods=db.products.filter(p=>p.cat===cat.id);

let procPickerTarget='proc';
let procProdUnits={};
let prFollowupUnit='hafta';

function setFollowupEnabled(enabled){
  document.getElementById('pr-fu-no-btn').className='tg-btn'+(enabled?'':' no');
  document.getElementById('pr-fu-yes-btn').className='tg-btn'+(enabled?' yes':'');
  document.getElementById('pr-fu-detail').style.display=enabled?'block':'none';
}

function setFollowupUnit(unit){
  prFollowupUnit=unit;
  ['gun','hafta','ay'].forEach(u=>{
    const b=document.getElementById('pr-fu-'+u);
    if(b) b.classList.toggle('sel',u===unit);
  });
}

function getProductsForProc(catId,subName){
  let ids;
  if(SUB_PROD_MAP[catId]){
    ids=(subName&&SUB_PROD_MAP[catId][subName])?SUB_PROD_MAP[catId][subName]:[...new Set(Object.values(SUB_PROD_MAP[catId]).flat())];
  } else {
    ids=[catId];
  }
  let prods=db.products.filter(p=>ids.includes(p.cat));
  if(ids.length>1){
    const seen=new Set();
    prods=prods.filter(p=>{if(seen.has(p.name))return false;seen.add(p.name);return true;});
  }
  return prods;
}

function updateProcRecordProducts(){
  const typeId=document.getElementById('pr-type-id').value;
  const typeName=document.getElementById('pr-type-name').value.trim();
  const el=document.getElementById('pr-products-section');
  if(!el) return;
  if(!typeId&&!typeName){el.innerHTML='';return;}
  let products=[];
  if(typeId){
    const cat=db.cats.find(c=>c.id===typeId);
    if(cat){
      if(isCatDirect(cat)){
        const selProd=db.products.find(p=>p.cat===typeId&&p.name===typeName);
        products=selProd?[selProd]:getProductsForProc(typeId,'');
      } else {
        products=getProductsForProc(typeId,typeName);
      }
    }
  }
  if(!products.length&&typeName){
    const prod=db.products.find(p=>p.name.toLowerCase()===typeName.toLowerCase());
    if(prod) products=[prod];
  }
  if(!products.length){el.innerHTML='';return;}
  let html='<div style="background:#f0f7fa;border-radius:8px;margin-bottom:4px;overflow:hidden">';
  html+='<div style="padding:8px 14px 4px;font-size:11px;font-weight:700;color:var(--tl);text-transform:uppercase;letter-spacing:.5px">Kullanılan Ürünler</div>';
  products.forEach(prod=>{
    const u=(prod.unit==='cc'?'ml':prod.unit)||'adet';
    procProdUnits[prod.id]=u;
    html+=`<div class="pr-row">
      <div class="pr-pname">${prod.name}</div>
      <input type="number" class="pr-qty" id="prp-${prod.id}" placeholder="0" min="0" step="0.1">
      <div class="utg">
        <button class="utg-btn${u==='adet'?' sel':''}" id="pru-${prod.id}-adet" onclick="setProcProdUnit('${prod.id}','adet')">adet</button>
        <button class="utg-btn${u==='ml'?' sel':''}" id="pru-${prod.id}-ml" onclick="setProcProdUnit('${prod.id}','ml')">ml</button>
      </div>
    </div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}

function setProcProdUnit(prodId,unit){
  procProdUnits[prodId]=unit;
  ['adet','ml'].forEach(u=>{
    const btn=document.getElementById('pru-'+prodId+'-'+u);
    if(btn) btn.classList.toggle('sel',u===unit);
  });
}

function fillProcSavedProducts(prods){
  if(!prods||!prods.length) return;
  prods.forEach(pp=>{
    const inp=document.getElementById('prp-'+pp.id);
    if(inp) inp.value=pp.qty||'';
    if(pp.unit) setProcProdUnit(pp.id,pp.unit);
  });
}

function openProcPicker(target){
  procPickerTarget=target;
  let html='';
  db.cats.forEach((cat,i)=>{
    const isDirect=isCatDirect(cat);
    const hasSubs=!isDirect&&cat.subs&&cat.subs.length>0;
    const prods=isDirect?db.products.filter(p=>p.cat===cat.id):[];
    const hasProds=prods.length>0;

    if(hasSubs||hasProds){
      // Expandable category
      html+=`<div class="proc-pick-cat" onclick="togglePickerCat(${i})">
        <span>${cat.icon} ${cat.name}</span>
        <svg class="ppc-arrow" id="ppc-arrow-${i}" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </div>
      <div id="ppc-subs-${i}" style="display:none">`;
      if(hasSubs){
        cat.subs.forEach((sub,si)=>{
          const enc=encodeURIComponent(sub);
          const subProds=getProductsForProc(cat.id,sub);
          const subKey=`${i}-${si}`;
          if(subProds.length>0){
            html+=`<div class="proc-pick-item" onclick="togglePickerSub('${subKey}')">
              <span>${sub}</span>
              <svg class="pps-arrow" id="pps-arr-${subKey}" viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="#8a9ab0" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
            </div>
            <div id="pps-${subKey}" style="display:none">`;
            subProds.forEach(prod=>{
              html+=`<div class="proc-pick-prod" onclick="selectProcFromPicker('${cat.id}',decodeURIComponent('${enc}'))">
                <span>· ${prod.name}</span>
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#8a9ab0" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
              </div>`;
            });
            html+='</div>';
          } else {
            html+=`<div class="proc-pick-item" onclick="selectProcFromPicker('${cat.id}',decodeURIComponent('${enc}'))">
              <span>${sub}</span>
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="#8a9ab0" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
            </div>`;
          }
        });
      } else {
        prods.forEach(prod=>{
          const encName=encodeURIComponent(prod.name);
          html+=`<div class="proc-pick-item" onclick="selectProcFromPicker('${cat.id}',decodeURIComponent('${encName}'))">
            <span>${prod.name}</span>
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="#8a9ab0" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
          </div>`;
        });
      }
      html+='</div>';
    } else {
      // No sub-items: direct select
      html+=`<div class="proc-pick-cat" onclick="selectProcFromPicker('${cat.id}','${cat.name}')">
        <span>${cat.icon} ${cat.name}</span>
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="var(--tl)" stroke-width="2" style="flex-shrink:0"><path d="M9 18l6-6-6-6"/></svg>
      </div>`;
    }
  });
  document.getElementById('proc-picker-body').innerHTML=html;
  openModal('ov-proc-picker');
}

function saveProcRecord(){
  const editId=document.getElementById('pr-edit-id').value;
  const typeId=document.getElementById('pr-type-id').value;
  const typeName=document.getElementById('pr-type-name').value.trim();
  const patientName=document.getElementById('pr-patient-input').value.trim();
  const date=document.getElementById('pr-date').value;
  const price=document.getElementById('pr-price').value;
  const notes=document.getElementById('pr-notes').value.trim();
  const kind=document.getElementById('pr-kind').value||'new';
  if(!patientName||!date){showToast('Hasta adı ve tarih gerekli');return;}
  const patient=db.patients.find(p=>p.name.toLowerCase()===patientName.toLowerCase());
  // Collect used products
  const usedProds=[];
  document.querySelectorAll('[id^="prp-"]').forEach(inp=>{
    const qty=parseFloat(inp.value);
    if(qty>0){
      const pid2=inp.id.replace('prp-','');
      const prod=db.products.find(p=>p.id===pid2);
      if(prod) usedProds.push({id:pid2,name:prod.name,qty,unit:procProdUnits[pid2]||prod.unit||'adet'});
    }
  });

  if(editId){
    const proc=db.procedures.find(x=>x.id===editId);
    if(proc) Object.assign(proc,{typeId,typeName,patientName,patientId:patient?patient.id:proc.patientId,date,price:price?parseFloat(price):0,notes,kind,products:usedProds});
    saveDB('procedures');
    closeModal('ov-proc-record');
    renderRecentProcs();
    showToast('İşlem güncellendi');
    if(currentEditProcPatientId) renderPatientFile(currentEditProcPatientId,'view');
    return;
  }

  db.procedures.push({id:uid(),patientId:patient?patient.id:null,patientName,typeId,typeName,date,price:price?parseFloat(price):0,notes,kind,products:usedProds});
  saveDB('procedures');
  closeModal('ov-proc-record');
  renderRecentProcs();

  // Botoks kontrolü — yeni ise 2 hafta sonra "Botoks Kontrol", kontrol ise "Botoks Kontrol Foto"
  const catOfProc=db.cats.find(c=>c.id===typeId);
  const catNameLower=catOfProc?catOfProc.name.toLowerCase():'';
  const isBotoks=(typeName&&typeName.toLowerCase().includes('botoks'))||catNameLower.includes('botoks');
  if(isBotoks&&kind!=='control'){
    const d=new Date(date+'T00:00:00');
    d.setDate(d.getDate()+14);
    db.appointments.push({id:uid(),patientName,procedure:'Botoks Kontrol',date:dateStr(d),time:'10:00',notes:'Botoks kontrol randevusu (otomatik)'});
    saveDB('appointments');
    showToast('İşlem kaydedildi — '+formatDate(dateStr(d))+' tarihine Botoks Kontrol randevusu eklendi ✓');
  } else if(isBotoks&&kind==='control'){
    const d=new Date(date+'T00:00:00');
    d.setDate(d.getDate()+14);
    db.appointments.push({id:uid(),patientName,procedure:'Botoks Kontrol Foto',date:dateStr(d),time:'10:00',notes:'Botoks kontrol fotoğraf randevusu (otomatik)'});
    saveDB('appointments');
    showToast('Kontrol kaydedildi — '+formatDate(dateStr(d))+' tarihine Botoks Kontrol Foto randevusu eklendi ✓');
  } else {
    showToast(kind==='control'?'Kontrol kaydedildi':'İşlem kaydedildi');
  }
  // Kontrol randevusu
  const fuYesBtn=document.getElementById('pr-fu-yes-btn');
  if(fuYesBtn&&fuYesBtn.classList.contains('yes')){
    const num=Math.max(1,parseInt(document.getElementById('pr-fu-num').value)||1);
    const d=new Date(date+'T00:00:00');
    if(prFollowupUnit==='gun') d.setDate(d.getDate()+num);
    else if(prFollowupUnit==='hafta') d.setDate(d.getDate()+num*7);
    else if(prFollowupUnit==='ay') d.setMonth(d.getMonth()+num);
    const unitLabel=prFollowupUnit==='gun'?'gün':prFollowupUnit==='hafta'?'hafta':'ay';
    db.appointments.push({id:uid(),patientName,procedure:(typeName||'İşlem')+' Kontrol',date:dateStr(d),time:'10:00',notes:num+' '+unitLabel+' sonra kontrol randevusu (otomatik)'});
    saveDB('appointments');
    showToast('✓ '+formatDate(dateStr(d))+' tarihine kontrol randevusu eklendi');
  }
  if(currentEditProcPatientId) renderPatientFile(currentEditProcPatientId,'view');
}

let fiyatCurrentCat=null;
let fiyatCurrentSub=null;
let fiyatCurrentQtys={};
let fiyatCurrentUnits={};

function renderFiyatlama(){
  const el=document.getElementById('fiyatlama-content');
  let html='<div style="padding-bottom:30px">';
  html+='<div style="padding:12px 14px 4px;font-size:13px;color:var(--tl)">Bir işlem seçerek seans fiyatını hesaplayın.</div>';
  CATS.forEach(cat=>{
    html+=`<div class="acc-item">
      <div class="acc-head" onclick="toggleAcc(this)">
        <div class="acc-icon">${cat.icon}</div>
        <div class="acc-title">${cat.name}</div>
        <div class="acc-arrow">▼</div>
      </div>
      <div class="acc-body">`;
    const items=cat.subs.length?cat.subs:[cat.name];
    items.forEach(sub=>{
      const key=cat.id+(cat.subs.length?'::'+sub:'');
      const tmpl=db.fiyatTemplates[key];
      const price=tmpl&&tmpl.sessionPrice?'₺'+Number(tmpl.sessionPrice).toLocaleString('tr-TR'):'';
      html+=`<div class="acc-sub" onclick="openFiyatDetail('${cat.id}','${sub}','${cat.name}')">
        <div class="acc-sub-name">${sub}</div>
        ${price?`<div style="font-size:13px;font-weight:700;color:var(--p)">${price}</div>`:''}
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#8a9ab0" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </div>`;
    });
    html+='</div></div>';
  });
  html+='</div>';
  el.innerHTML=html;
}

function openFiyatDetail(catId,sub,catName,isProdDirect){
  fiyatCurrentCat=catId;
  fiyatCurrentSub=sub;
  let key,catProducts,title;
  if(isProdDirect){
    key=catId+'::prod::'+sub;
    const prod=db.products.find(p=>p.id===sub);
    catProducts=prod?[prod]:[];
    title=prod?prod.name:catName;
  } else {
    key=catId+(sub!==catName?'::'+sub:'');
    title=catName===sub?catName:catName+' – '+sub;
    catProducts=db.products.filter(p=>p.cat===catId||p.cat.startsWith(catId+'-'));
  }
  const tmpl=db.fiyatTemplates[key]||{};
  fiyatCurrentQtys=Object.assign({},tmpl.qtys||{});
  fiyatCurrentUnits=Object.assign({},tmpl.units||{});
  document.getElementById('fd-title').textContent=title;
  let html='';
  if(catProducts.length){
    catProducts.forEach(prod=>{
      const rawU=fiyatCurrentUnits[prod.id]||prod.unit||'adet';
      const u=rawU==='cc'?'ml':rawU;
      html+=`<div class="pr-row">
        <div class="pr-pname">${prod.name}</div>
        <input type="number" class="pr-qty" id="fq-${prod.id}" value="${fiyatCurrentQtys[prod.id]||''}" placeholder="0" min="0" step="0.1" oninput="updateFiyatTotal()">
        <div class="utg">
          <button class="utg-btn${u==='adet'?' sel':''}" id="fu-${prod.id}-adet" onclick="setFiyatUnit('${prod.id}','adet')">adet</button>
          <button class="utg-btn${u==='ml'?' sel':''}" id="fu-${prod.id}-ml" onclick="setFiyatUnit('${prod.id}','ml')">ml</button>
        </div>
        <div class="pr-price-inline" id="fp-${prod.id}"></div>
      </div>`;
    });
  }
  html+='<div id="fd-total-box"></div>';
  document.getElementById('fd-body').innerHTML=html;
  document.getElementById('fd-body').dataset.products=JSON.stringify(catProducts.map(p=>{
    const effectivePrice=p.priceInEuro?(p.eurPrice||0)*(parseFloat(db.settings.euroRate)||0):(p.price||0);
    return {id:p.id,unit:p.unit,price:effectivePrice};
  }));
  document.getElementById('fd-body').dataset.key=key;
  updateFiyatTotal();
  openModal('ov-fiyat-detail');
}

function setFiyatUnit(prodId,unit){
  fiyatCurrentUnits[prodId]=unit;
  ['adet','ml'].forEach(u=>{
    const btn=document.getElementById('fu-'+prodId+'-'+u);
    if(btn) btn.classList.toggle('sel',u===unit);
  });
}

function updateFiyatTotal(){
  const body=document.getElementById('fd-body');
  const products=JSON.parse(body.dataset.products||'[]');
  const qtys={};
  const labor=db.settings.laborMult*(parseFloat(db.settings.euroRate)||0);
  const sarfCost=parseFloat(db.settings.sarfCost)||0;
  products.forEach(p=>{
    const el=document.getElementById('fq-'+p.id);
    const qty=el?parseFloat(el.value)||0:0;
    const cost=qty*(parseFloat(p.price)||0);
    if(qty>0) qtys[p.id]=qty;
    const priceEl=document.getElementById('fp-'+p.id);
    // Her ürün için bağımsız seans ücreti: ürün maliyeti + işçilik + sarf
    if(priceEl) priceEl.textContent=qty>0?'₺'+(cost+labor+sarfCost).toLocaleString('tr-TR',{maximumFractionDigits:0}):'';
  });
  fiyatCurrentQtys=qtys;
  document.getElementById('fd-total-box').innerHTML='';
}

function saveFiyatTemplate(){
  const body=document.getElementById('fd-body');
  const key=body.dataset.key;
  const products=JSON.parse(body.dataset.products||'[]');
  const labor=db.settings.laborMult*(parseFloat(db.settings.euroRate)||0);
  const sarfCost=parseFloat(db.settings.sarfCost)||0;
  let materialCost=0;
  Object.entries(fiyatCurrentQtys).forEach(([id,qty])=>{
    const prod=products.find(p=>p.id===id);
    if(prod) materialCost+=qty*(parseFloat(prod.price)||0);
  });
  const sessionPrice=materialCost+labor+sarfCost;
  db.fiyatTemplates[key]={qtys:fiyatCurrentQtys,units:fiyatCurrentUnits,sessionPrice};
  saveDB('fiyatTemplates');
  closeModal('ov-fiyat-detail');
  renderGenelIslemler();
  showToast('Fiyat kaydedildi');
}

// ==================== İŞLEM YÖNETİMİ ====================
let yonetNewType='direct';
let yonetUnits={};
let yonetEditState=null;

function setYonetType(t){
  yonetNewType=t;
  const dBtn=document.getElementById('yonet-type-direct');
  const sBtn=document.getElementById('yonet-type-subs');
  if(dBtn) dBtn.className='tg-btn'+(t==='direct'?' yes':'');
  if(sBtn) sBtn.className='tg-btn'+(t==='subs'?' yes':'');
}

function addNewCat(){
  const icon=document.getElementById('yonet-new-icon').value.trim()||'💊';
  const name=document.getElementById('yonet-new-name').value.trim();
  if(!name){showToast('Kategori adı gerekli');return;}
  const id='cat_'+Date.now();
  db.cats.push({id,name,icon,subs:[],direct:yonetNewType==='direct'});
  saveDB('cats');
  document.getElementById('yonet-new-icon').value='';
  document.getElementById('yonet-new-name').value='';
  renderIslemYonet();
  renderGenelIslemler();
  showToast('Kategori eklendi');
}

function deleteCat(catId){
  db.cats=db.cats.filter(c=>c.id!==catId);
  saveDB('cats');
  yonetEditState=null;
  renderIslemYonet();
  renderGenelIslemler();
  showToast('Kategori silindi');
}

function addSubToCat(catId){
  const input=document.getElementById('ys-'+catId);
  if(!input) return;
  const sub=input.value.trim();
  if(!sub){showToast('Alt başlık adı gerekli');return;}
  const cat=db.cats.find(c=>c.id===catId);
  if(!cat) return;
  if(!cat.subs.includes(sub)) cat.subs.push(sub);
  saveDB('cats');
  input.value='';
  renderIslemYonet();
  renderGenelIslemler();
  showToast('Alt başlık eklendi');
}

function deleteSubFromCat(catId,sub){
  const cat=db.cats.find(c=>c.id===catId);
  if(!cat) return;
  cat.subs=cat.subs.filter(s=>s!==sub);
  saveDB('cats');
  yonetEditState=null;
  renderIslemYonet();
  renderGenelIslemler();
}

function setYonetUnit(catId,unit){
  yonetUnits[catId]=unit;
  const aBtn=document.getElementById('yu-'+catId+'-adet');
  const mBtn=document.getElementById('yu-'+catId+'-ml');
  if(aBtn) aBtn.classList.toggle('sel',unit==='adet');
  if(mBtn) mBtn.classList.toggle('sel',unit==='ml');
}

function addProdToCat(catId){
  const nameEl=document.getElementById('yp-name-'+catId);
  if(!nameEl) return;
  const name=nameEl.value.trim();
  if(!name){showToast('Ürün adı gerekli');return;}
  const unit=yonetUnits[catId]||'adet';
  const id='prod_'+Date.now();
  db.products.push({id,name,cat:catId,unit,price:0});
  saveDB('products');
  nameEl.value='';
  renderIslemYonet();
  renderGenelIslemler();
  showToast('Ürün eklendi');
}

function removeProdFromCat(prodId){
  db.products=db.products.filter(p=>p.id!==prodId);
  saveDB('products');
  yonetEditState=null;
  renderIslemYonet();
  renderGenelIslemler();
  showToast('Ürün silindi');
}

function startYonetRename(type,catId,sub,prodId){
  yonetEditState={type,catId:catId||null,sub:sub||null,prodId:prodId||null};
  renderIslemYonet();
}

function cancelYonetRename(){
  yonetEditState=null;
  renderIslemYonet();
}

function saveCatRename(catId){
  const newIcon=(document.getElementById('ren-cat-icon')||{}).value||'';
  const newName=(document.getElementById('ren-cat-name')||{}).value.trim();
  if(!newName){showToast('Kategori adı boş olamaz');return;}
  const cat=db.cats.find(c=>c.id===catId);
  if(cat){
    if(newIcon.trim()) cat.icon=newIcon.trim();
    cat.name=newName;
    saveDB('cats');
    renderGenelIslemler();
  }
  yonetEditState=null;
  renderIslemYonet();
  showToast('Kategori güncellendi');
}

function saveSubRename(catId,oldSub){
  const newName=(document.getElementById('ren-sub-name')||{}).value.trim();
  if(!newName){showToast('Alt başlık adı boş olamaz');return;}
  const cat=db.cats.find(c=>c.id===catId);
  if(cat){
    const idx=cat.subs.indexOf(oldSub);
    if(idx>=0) cat.subs[idx]=newName;
    db.procedures.forEach(p=>{if(p.typeName===oldSub&&p.typeId===catId)p.typeName=newName;});
    saveDB('cats');
    saveDB('procedures');
    renderGenelIslemler();
  }
  yonetEditState=null;
  renderIslemYonet();
  showToast('Alt başlık güncellendi');
}

function saveProdRename(prodId){
  const newName=(document.getElementById('ren-prod-name')||{}).value.trim();
  if(!newName){showToast('Ürün adı boş olamaz');return;}
  const prod=db.products.find(p=>p.id===prodId);
  if(prod){
    prod.name=newName;
    saveDB('products');
    renderGenelIslemler();
  }
  yonetEditState=null;
  renderIslemYonet();
  showToast('Ürün adı güncellendi');
}

function renderIslemYonet(){
  const el=document.getElementById('islem-yonet');
  if(!el) return;
  let html='<div style="padding:10px 14px;padding-bottom:30px">';
  html+=`<div style="background:#fff;border-radius:12px;padding:14px;box-shadow:var(--sh);margin-bottom:12px">
    <div style="font-size:14px;font-weight:700;color:var(--p);margin-bottom:10px">Yeni Kategori Ekle</div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <input type="text" class="fc" id="yonet-new-icon" placeholder="💊" style="width:52px;text-align:center;font-size:20px">
      <input type="text" class="fc" id="yonet-new-name" placeholder="Kategori adı" style="flex:1">
    </div>
    <div class="tg-grp" style="margin-bottom:10px">
      <button class="tg-btn yes" id="yonet-type-direct" onclick="setYonetType('direct')">Ürün Listeli</button>
      <button class="tg-btn" id="yonet-type-subs" onclick="setYonetType('subs')">Alt Başlıklı</button>
    </div>
    <button class="btn btn-p" style="width:100%" onclick="addNewCat()">+ Kategori Ekle</button>
  </div>`;
  db.cats.forEach(cat=>{
    const isDirect=isCatDirect(cat);
    const prods=isDirect?db.products.filter(p=>p.cat===cat.id):[];
    const isEditingCat=yonetEditState&&yonetEditState.type==='cat'&&yonetEditState.catId===cat.id;
    html+=`<div class="acc-item" style="margin-bottom:10px">
      <div class="acc-head" onclick="toggleAcc(this)">
        <div class="acc-icon">${cat.icon}</div>
        <div style="flex:1">
          <div class="acc-title">${cat.name}</div>
          <div style="font-size:11px;color:var(--tl);font-weight:400;margin-top:1px">${isDirect?'ürün listeli':'alt başlıklı'}</div>
        </div>
        <button style="background:none;border:none;font-size:15px;cursor:pointer;padding:4px 8px;color:var(--tl)" onclick="event.stopPropagation();startYonetRename('cat','${cat.id}')">✏️</button>
        <button style="background:none;border:none;font-size:18px;cursor:pointer;padding:4px 8px" onclick="event.stopPropagation();deleteCat('${cat.id}')">🗑</button>
        <div class="acc-arrow">▼</div>
      </div>
      <div class="acc-body"${isEditingCat?' style="display:block"':''}>`;
    if(isEditingCat){
      html+=`<div style="padding:12px 14px;border-bottom:1px solid var(--b);background:#f0f7fa">
        <div style="font-size:12px;color:var(--tl);font-weight:600;margin-bottom:6px">Kategori Adını Düzenle</div>
        <div style="display:flex;gap:8px;margin-bottom:8px">
          <input type="text" class="fc" id="ren-cat-icon" value="${cat.icon}" style="width:52px;text-align:center;font-size:20px">
          <input type="text" class="fc" id="ren-cat-name" value="${cat.name}" style="flex:1">
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sec btn-sm" style="flex:1" onclick="cancelYonetRename()">İptal</button>
          <button class="btn btn-p btn-sm" style="flex:1" onclick="saveCatRename('${cat.id}')">Kaydet</button>
        </div>
      </div>`;
    }
    if(isDirect){
      prods.forEach(prod=>{
        const dispUnit=prod.unit==='cc'?'ml':prod.unit;
        const isEditingProd=yonetEditState&&yonetEditState.type==='prod'&&yonetEditState.prodId===prod.id;
        if(isEditingProd){
          html+=`<div style="padding:10px 14px;border-bottom:1px solid var(--b);background:#f0f7fa">
            <div style="display:flex;gap:8px;align-items:center">
              <input type="text" class="fc" id="ren-prod-name" value="${prod.name}" style="flex:1">
              <button class="btn btn-sec btn-sm" style="padding:6px 10px" onclick="cancelYonetRename()">✕</button>
              <button class="btn btn-p btn-sm" style="padding:6px 10px" onclick="saveProdRename('${prod.id}')">✓</button>
            </div>
          </div>`;
        } else {
          html+=`<div style="display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--b);gap:8px">
            <div style="flex:1;font-size:14px">${prod.name} <span style="font-size:11px;color:var(--tl)">(${dispUnit})</span></div>
            <button style="background:none;border:none;font-size:14px;cursor:pointer;color:var(--tl);padding:2px 6px" onclick="startYonetRename('prod','${cat.id}',null,'${prod.id}')">✏️</button>
            <button style="background:none;border:none;font-size:18px;cursor:pointer;color:#e74c3c;padding:2px 6px" onclick="removeProdFromCat('${prod.id}')">×</button>
          </div>`;
        }
      });
      if(!yonetUnits[cat.id]) yonetUnits[cat.id]='adet';
      html+=`<div style="padding:12px 14px">
        <div style="font-size:12px;color:var(--tl);font-weight:600;margin-bottom:6px">Ürün Ekle</div>
        <div style="display:flex;gap:6px;margin-bottom:8px">
          <input type="text" class="fc" id="yp-name-${cat.id}" placeholder="Ürün adı" style="flex:1">
          <div class="utg" style="align-self:center">
            <button class="utg-btn${(yonetUnits[cat.id]||'adet')==='adet'?' sel':''}" id="yu-${cat.id}-adet" onclick="setYonetUnit('${cat.id}','adet')">adet</button>
            <button class="utg-btn${(yonetUnits[cat.id]||'adet')==='ml'?' sel':''}" id="yu-${cat.id}-ml" onclick="setYonetUnit('${cat.id}','ml')">ml</button>
          </div>
        </div>
        <button class="btn btn-p" style="width:100%;font-size:13px" onclick="addProdToCat('${cat.id}')">+ Ekle</button>
      </div>`;
    } else {
      cat.subs.forEach(sub=>{
        const enc=encodeURIComponent(sub);
        const isEditingSub=yonetEditState&&yonetEditState.type==='sub'&&yonetEditState.catId===cat.id&&yonetEditState.sub===sub;
        if(isEditingSub){
          html+=`<div style="padding:10px 14px;border-bottom:1px solid var(--b);background:#f0f7fa">
            <div style="display:flex;gap:8px;align-items:center">
              <input type="text" class="fc" id="ren-sub-name" value="${sub}" style="flex:1">
              <button class="btn btn-sec btn-sm" style="padding:6px 10px" onclick="cancelYonetRename()">✕</button>
              <button class="btn btn-p btn-sm" style="padding:6px 10px" onclick="saveSubRename('${cat.id}',decodeURIComponent('${enc}'))">✓</button>
            </div>
          </div>`;
        } else {
          html+=`<div style="display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--b);gap:8px">
            <div style="flex:1;font-size:14px">${sub}</div>
            <button style="background:none;border:none;font-size:14px;cursor:pointer;color:var(--tl);padding:2px 6px" onclick="startYonetRename('sub','${cat.id}',decodeURIComponent('${enc}'),null)">✏️</button>
            <button style="background:none;border:none;font-size:18px;cursor:pointer;color:#e74c3c;padding:2px 6px" onclick="deleteSubFromCat('${cat.id}',decodeURIComponent('${enc}'))">×</button>
          </div>`;
        }
      });
      html+=`<div style="padding:12px 14px;display:flex;gap:8px">
        <input type="text" class="fc" id="ys-${cat.id}" placeholder="Alt başlık adı" style="flex:1">
        <button class="btn btn-p" style="padding:8px 14px;white-space:nowrap" onclick="addSubToCat('${cat.id}')">+ Ekle</button>
      </div>`;
    }
    html+='</div></div>';
  });
  html+='</div>';
  el.innerHTML=html;
  if(yonetEditState){
    let inp;
    if(yonetEditState.type==='cat') inp=document.getElementById('ren-cat-name');
    else if(yonetEditState.type==='sub') inp=document.getElementById('ren-sub-name');
    else if(yonetEditState.type==='prod') inp=document.getElementById('ren-prod-name');
    if(inp){inp.focus();inp.select();}
  }
}

// ==================== MALİYET ====================
let maliyetUnlocked=false;
let pinInput='';
let maliyetView='urunler';

function renderMaliyet(){
  maliyetUnlocked=false;
  document.getElementById('pin-screen').style.display='flex';
  document.getElementById('maliyet-content').style.display='none';
  renderPinKeypad();
  pinInput='';
  updatePinDots();
}

function renderPinKeypad(){
  const kp=document.getElementById('pin-kp');
  const keys=[['1','2','3'],['4','5','6'],['7','8','9'],['','0','⌫']];
  kp.innerHTML=keys.flat().map(k=>`<div class="pin-k" onclick="pinPress('${k}')">${k}</div>`).join('');
}

function pinPress(k){
  if(k==='') return;
  if(k==='⌫'){pinInput=pinInput.slice(0,-1);}
  else if(pinInput.length<4){pinInput+=k;}
  updatePinDots();
  if(pinInput.length===4){
    setTimeout(()=>{
      if(pinInput===db.settings.pin){
        maliyetUnlocked=true;
        showMaliyetContent();
      } else {
        document.getElementById('pin-err').textContent='Yanlış şifre';
        pinInput='';
        updatePinDots();
        setTimeout(()=>{document.getElementById('pin-err').textContent='';},1500);
      }
    },200);
  }
}

function updatePinDots(){
  for(let i=0;i<4;i++){
    const d=document.getElementById('pd'+i);
    if(d) d.className='pin-dot'+(i<pinInput.length?' filled':'');
  }
}

function savePinChange(){
  const np=document.getElementById('new-pin').value.trim();
  const nc=document.getElementById('new-pin-confirm').value.trim();
  const errEl=document.getElementById('pin-change-err');
  if(np.length!==4||!/^\d{4}$/.test(np)){errEl.textContent='Şifre 4 rakamdan oluşmalı';return;}
  if(np!==nc){errEl.textContent='Şifreler eşleşmiyor';return;}
  db.settings.pin=np;
  saveDB('settings');
  document.getElementById('new-pin').value='';
  document.getElementById('new-pin-confirm').value='';
  errEl.textContent='';
  closeModal('ov-pin-change');
  showToast('Şifre güncellendi');
}

function doResetPin(){
  const master=document.getElementById('pin-reset-master').value;
  const errEl=document.getElementById('pin-reset-err');
  if(master!=='Cerrahpasa@3288'){errEl.textContent='Master şifre yanlış';return;}
  db.settings.pin='1234';
  saveDB('settings');
  document.getElementById('pin-reset-master').value='';
  errEl.textContent='';
  closeModal('ov-pin-reset');
  showToast('Şifre 1234 olarak sıfırlandı');
}

function lockMaliyet(){
  maliyetUnlocked=false;
  pinInput='';
  document.getElementById('pin-screen').style.display='flex';
  document.getElementById('maliyet-content').style.display='none';
  updatePinDots();
}

function showMaliyetContent(){
  document.getElementById('pin-screen').style.display='none';
  const mc=document.getElementById('maliyet-content');
  mc.style.display='flex';
  mc.style.flexDirection='column';
  mc.style.flex='1';
  mc.style.overflow='hidden';
  renderEuroBar();
  if(maliyetView==='urunler') renderMaliyetUrunler();
  else renderMaliyetSarf();
}

function renderEuroBar(){
  const s=db.settings;
  const labor=(parseFloat(s.laborMult)||0)*(parseFloat(s.euroRate)||0);
  document.getElementById('maliyet-euro-bar').innerHTML=`
    <div class="ebox">
      <div class="elbl">€ Kuru</div>
      <input type="number" class="ein" value="${s.euroRate||40}" onchange="updateEuroRate(this.value)" placeholder="₺">
      <div class="eval" style="font-size:13px">₺</div>
    </div>
    <div class="lbox">
      <div class="elbl">İşçilik (×€)</div>
      <input type="number" class="ein" value="${s.laborMult||1}" onchange="updateLaborMult(this.value)" placeholder="0" min="0">
      <div class="lresult">= ₺${labor.toLocaleString('tr-TR',{maximumFractionDigits:0})}</div>
    </div>`;
}

function updateEuroRate(v){
  db.settings.euroRate=parseFloat(v)||0;
  saveDB('settings');
  renderEuroBar();
}

function updateLaborMult(v){
  db.settings.laborMult=parseFloat(v)||0;
  saveDB('settings');
  renderEuroBar();
}

function setMaliyetView(v,btn){
  maliyetView=v;
  document.getElementById('maliyet-urunler').style.display=v==='urunler'?'block':'none';
  document.getElementById('maliyet-sarf').style.display=v==='sarf'?'block':'none';
  document.getElementById('maliyet-yedek').style.display=v==='yedek'?'block':'none';
  document.querySelectorAll('#page-maliyet .seg .sbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(v==='urunler') renderMaliyetUrunler();
  else if(v==='sarf') renderMaliyetSarf();
  else renderMaliyetYedek();
}

function renderMaliyetUrunler(){
  const el=document.getElementById('maliyet-urunler');
  let html='<div style="padding-bottom:30px">';
  PROD_CATS.forEach(cat=>{
    const prods=db.products.filter(p=>p.cat===cat.id);
    html+=`<div class="acc-item">
      <div class="acc-head" onclick="toggleAcc(this)">
        <div class="acc-icon">${cat.icon}</div>
        <div class="acc-title">${cat.name}</div>
        <div class="acc-arrow">▼</div>
      </div>
      <div class="acc-body open">`;
    prods.forEach(prod=>{
      const isIV=cat.id==='iv';
      const useEur=isIV&&prod.priceInEuro;
      const tlVal=useEur?((prod.eurPrice||0)*(parseFloat(db.settings.euroRate)||0)).toLocaleString('tr-TR',{maximumFractionDigits:0}):'';
      html+=`<div class="ci">
        <div class="ci-name">${prod.name}</div>
        <select class="ci-unit" onchange="updateProductUnit('${prod.id}',this.value)">
          <option ${prod.unit==='adet'?'selected':''}>adet</option>
          <option ${prod.unit==='ml'?'selected':''}>ml</option>
          <option ${prod.unit==='kutu'?'selected':''}>kutu</option>
        </select>
        ${isIV?`<div class="utg" style="flex-shrink:0">
          <button class="utg-btn${useEur?'':' sel'}" onclick="setProdCurrency('${prod.id}','TL')">₺</button>
          <button class="utg-btn${useEur?' sel':''}" onclick="setProdCurrency('${prod.id}','EUR')">€</button>
        </div>`:''}
        ${useEur
          ?`<input type="number" class="ci-price" style="width:64px" value="${prod.eurPrice||''}" placeholder="€" oninput="updateProductPriceEur('${prod.id}',this.value)">
            <span id="prod-tl-${prod.id}" style="font-size:11px;color:var(--tl);white-space:nowrap">= ₺${tlVal}</span>`
          :`<input type="number" class="ci-price" value="${prod.price||''}" placeholder="₺ fiyat" onchange="updateProductPrice('${prod.id}',this.value)">`
        }
        <button class="ci-del" onclick="deleteProduct('${prod.id}')">✕</button>
      </div>`;
    });
    html+=`<div style="padding:8px 14px;border-top:1px solid var(--b)">
      <button class="btn btn-sec btn-sm btn-full" onclick="openAddProductModal('${cat.id}')">+ Ürün Ekle</button>
    </div>`;
    html+='</div></div>';
  });
  html+='</div>';
  el.innerHTML=html;
}

function updateProductUnit(id,v){
  const p=db.products.find(x=>x.id===id);
  if(p){p.unit=v;saveDB('products');}
}

function updateProductPrice(id,v){
  const p=db.products.find(x=>x.id===id);
  if(p){p.price=parseFloat(v)||0;saveDB('products');}
}

function setProdCurrency(id,currency){
  const p=db.products.find(x=>x.id===id);
  if(!p) return;
  const rate=parseFloat(db.settings.euroRate)||1;
  if(currency==='EUR'){
    p.priceInEuro=true;
    if(!p.eurPrice) p.eurPrice=p.price?Math.round(p.price/rate*10)/10:0;
  } else {
    p.priceInEuro=false;
    if(p.eurPrice) p.price=Math.round((p.eurPrice||0)*rate);
  }
  saveDB('products');
  renderMaliyetUrunler();
}

function updateProductPriceEur(id,eurVal){
  const p=db.products.find(x=>x.id===id);
  if(!p) return;
  p.eurPrice=parseFloat(eurVal)||0;
  p.price=Math.round(p.eurPrice*(parseFloat(db.settings.euroRate)||0));
  saveDB('products');
  const tlEl=document.getElementById('prod-tl-'+id);
  if(tlEl) tlEl.textContent='= ₺'+p.price.toLocaleString('tr-TR',{maximumFractionDigits:0});
}

function deleteProduct(id){
  db.products=db.products.filter(x=>x.id!==id);
  saveDB('products');
  renderMaliyetUrunler();
}

function openAddProductModal(catId){
  document.getElementById('ap-category').value=catId;
  document.getElementById('ap-name').value='';
  document.getElementById('ap-unit').value='adet';
  document.getElementById('ap-price').value='';
  openModal('ov-add-product');
}

function saveNewProduct(){
  const name=document.getElementById('ap-name').value.trim();
  if(!name){showToast('Ürün adı gerekli');return;}
  const catId=document.getElementById('ap-category').value;
  db.products.push({
    id:'custom-'+uid(),
    name,
    cat:catId,
    unit:document.getElementById('ap-unit').value,
    price:parseFloat(document.getElementById('ap-price').value)||0
  });
  saveDB('products');
  closeModal('ov-add-product');

}

function renderMaliyetSarf(){
  const el=document.getElementById('maliyet-sarf');
  const sarfCost=db.settings.sarfCost||0;
  let html='<div style="padding-bottom:30px">';
  html+=`<div class="sarf-cost-box">
    <div class="sarf-cost-lbl">İşlem Sarf Maliyeti</div>
    <input type="number" class="sarf-cost-in" value="${sarfCost}" placeholder="₺" onchange="updateSarfCost(this.value)">
  </div>`;
  db.consumables.forEach(c=>{
    if(c.isParent){
      html+=`<div style="display:flex;align-items:center;padding:10px 14px 4px;background:var(--bg)">
        <div style="font-size:12px;font-weight:700;color:var(--tl);text-transform:uppercase;letter-spacing:.5px;flex:1">${c.name}</div>
        <button class="ci-del" onclick="deleteCons('${c.id}')" style="font-size:13px">✕</button>
      </div>`;
    } else if(c.parent){
      html+=`<div class="ci" style="padding-left:28px;background:#fafbfc">
        <div class="ci-name" style="font-size:13px;color:var(--t)">${c.name}</div>
        <select class="ci-unit" onchange="updateConsUnit('${c.id}',this.value)">
          <option ${c.unit==='adet'?'selected':''}>adet</option>
          <option ${c.unit==='cc'?'selected':''}>cc</option>
          <option ${c.unit==='ml'?'selected':''}>ml</option>
          <option ${c.unit==='kutu'?'selected':''}>kutu</option>
        </select>
        <input type="number" class="ci-price" value="${c.price||''}" placeholder="₺" onchange="updateConsPrice('${c.id}',this.value)">
        <button class="ci-del" onclick="deleteCons('${c.id}')">✕</button>
      </div>`;
    } else {
      html+=`<div class="ci">
        <div class="ci-name">${c.name}</div>
        <select class="ci-unit" onchange="updateConsUnit('${c.id}',this.value)">
          <option ${c.unit==='adet'?'selected':''}>adet</option>
          <option ${c.unit==='cc'?'selected':''}>cc</option>
          <option ${c.unit==='ml'?'selected':''}>ml</option>
          <option ${c.unit==='kutu'?'selected':''}>kutu</option>
        </select>
        <input type="number" class="ci-price" value="${c.price||''}" placeholder="₺" onchange="updateConsPrice('${c.id}',this.value)">
        <button class="ci-del" onclick="deleteCons('${c.id}')">✕</button>
      </div>`;
    }
  });
  html+=`<div style="padding:14px">
    <button class="btn btn-sec btn-sm btn-full" onclick="addNewCons()">+ Sarf Malzeme Ekle</button>
  </div>`;
  html+='</div>';
  el.innerHTML=html;
}

function updateSarfCost(v){
  db.settings.sarfCost=parseFloat(v)||0;
  saveDB('settings');
}

function updateConsUnit(id,v){
  const c=db.consumables.find(x=>x.id===id);
  if(c){c.unit=v;saveDB('consumables');}
}

function updateConsPrice(id,v){
  const c=db.consumables.find(x=>x.id===id);
  if(c){c.price=parseFloat(v)||0;saveDB('consumables');}
}

function deleteCons(id){
  db.consumables=db.consumables.filter(x=>x.id!==id);
  saveDB('consumables');
  renderMaliyetSarf();
}

function addNewCons(){
  const name=prompt('Sarf malzeme adı:');
  if(!name||!name.trim()) return;
  db.consumables.push({id:'cons-'+uid(),name:name.trim(),unit:'adet',price:0});
  saveDB('consumables');
  renderMaliyetSarf();
}

function fileTimestamp(){
  const n=new Date();
  const d=n.toLocaleDateString('tr-TR').replace(/\./g,'-');
  const h=String(n.getHours()).padStart(2,'0');
  const m=String(n.getMinutes()).padStart(2,'0');
  return d+'_'+h+'-'+m;
}

function exportPatientsExcel(){
  if(!db.patients.length){showToast('Kayıtlı hasta yok');return;}
  const rows=db.patients.map(p=>{
    const procs=db.procedures.filter(x=>x.patientId===p.id||(x.patientName&&x.patientName.toLowerCase()===p.name.toLowerCase()));
    const lastProc=procs.length?procs.map(x=>x.date).sort().pop():'';
    return {
      'Ad Soyad':p.name||'',
      'Cinsiyet':p.gender==='K'?'Kadın':p.gender==='E'?'Erkek':'',
      'TC No':p.tc||'',
      'Yaş':p.age||'',
      'Telefon':p.phone||'',
      'Kayıt Tarihi':p.createdAt?formatDate(p.createdAt):'',
      'Şikayet':p.complaint||'',
      'Kronik Hastalık':p.chronic?((p.chronic.has==='Var'?'Var: '+p.chronic.detail:'Yok')):'',
      'Bağışıklık Sorunu':p.immune?((p.immune.has==='Var'?'Var: '+p.immune.detail:'Yok')):'',
      'İlaç Kullanımı':p.meds?((p.meds.has==='Var'?'Var: '+p.meds.detail:'Yok')):'',
      'Alerji':p.allergy?((p.allergy.has==='Var'?'Var: '+p.allergy.detail:'Yok')):'',
      'Kan Değerleri':p.blood?((p.blood.has==='Var'?'Var: '+p.blood.detail:'Yok')):'',
      'Enfeksiyon':p.infect?((p.infect.has==='Var'?'Var: '+p.infect.detail:'Yok')):'',
      'Ameliyat Geçmişi':p.surgery?((p.surgery.has==='Var'?'Var: '+p.surgery.detail:'Yok')):'',
      'Estetik Geçmişi':p.aesthetic?((p.aesthetic.has==='Var'?'Var: '+p.aesthetic.detail:'Yok')):'',
      'Gebelik':p.pregnancy||'',
      'Emzirme':p.breastfeed||'',
      'Toplam İşlem':procs.length,
      'Son İşlem':lastProc?formatDate(lastProc):''
    };
  });
  const ws=XLSX.utils.json_to_sheet(rows);
  // Sütun genişlikleri
  ws['!cols']=[{wch:22},{wch:8},{wch:14},{wch:5},{wch:14},{wch:12},{wch:20},
    {wch:22},{wch:22},{wch:22},{wch:22},{wch:22},{wch:22},{wch:22},{wch:22},
    {wch:10},{wch:10},{wch:12},{wch:12}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Hasta Listesi');
  XLSX.writeFile(wb,'hasta-listesi-'+fileTimestamp()+'.xlsx');
  showToast('✓ Hasta listesi indirildi');
}

function exportProceduresExcel(){
  if(!db.procedures.length){showToast('Kayıtlı işlem yok');return;}
  const sorted=[...db.procedures].sort((a,b)=>b.date.localeCompare(a.date));
  const rows=sorted.map(proc=>{
    const cat=db.cats.find(c=>c.id===proc.typeId);
    const catName=cat?cat.name:(proc.typeId||'');
    const subName=(proc.typeName&&proc.typeName!==catName)?proc.typeName:'';
    const prodsStr=(proc.products||[]).map(p=>p.name+(p.qty&&p.qty!==1?' ×'+p.qty:'')).join(', ');
    const kindLabel=proc.kind==='control'?'Kontrol':proc.kind==='combo'?'Kombo':'Yeni';
    return {
      'Tarih':proc.date?formatDate(proc.date):'',
      'Hasta Adı':proc.patientName||'',
      'İşlem Kategorisi':catName,
      'Alt Başlık / İşlem':subName,
      'Tür':kindLabel,
      'Kullanılan Ürünler':prodsStr,
      'Seans Ücreti (₺)':proc.price||0,
      'Not':proc.notes||''
    };
  });
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:12},{wch:22},{wch:18},{wch:18},{wch:8},{wch:35},{wch:16},{wch:25}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'İşlemler');
  XLSX.writeFile(wb,'islemler-listesi-'+fileTimestamp()+'.xlsx');
  showToast('✓ İşlemler listesi indirildi');
}

function exportData(){
  saveDB();
  const data={
    version:1,
    exportDate:new Date().toISOString(),
    patients:db.patients,
    appointments:db.appointments,
    procedures:db.procedures,
    products:db.products,
    consumables:db.consumables,
    settings:{...db.settings},
    fiyatTemplates:db.fiyatTemplates,
    cats:db.cats
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='estetik-klinik-yedek-'+fileTimestamp()+'.json'; a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Veriler indirildi');
}

function importData(){
  const input=document.createElement('input');
  input.type='file'; input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!Array.isArray(data.patients)||!data.settings) throw new Error('invalid');
        if(!confirm('Mevcut tüm veriler silinecek ve yedekten geri yüklenecek.\nEmin misiniz?')) return;
        db.patients=data.patients||[];
        db.appointments=data.appointments||[];
        db.procedures=data.procedures||[];
        db.products=data.products||[];
        db.consumables=data.consumables||[];
        db.settings=data.settings||db.settings;
        db.fiyatTemplates=data.fiyatTemplates||{};
        if(data.cats&&Array.isArray(data.cats)) db.cats=data.cats;
        saveDB();
        showToast('✓ Veriler başarıyla yüklendi');
        renderMaliyetYedek();
      }catch(err){ showToast('Hata: Geçersiz yedek dosyası'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function exportPatientsAndAppts(){
  const data={
    type:'hasta-ajanda-yedegi',
    version:1,
    exportDate:new Date().toISOString(),
    patients:db.patients,
    procedures:db.procedures,
    appointments:db.appointments
  };

  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='hasta-ajanda-yedek-'+fileTimestamp()+'.json'; a.click();
  URL.revokeObjectURL(url);
  showToast('✓ Hasta & Ajanda yedeği indirildi');
}

function importPatientsAndAppts(){
  const input=document.createElement('input');
  input.type='file'; input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!Array.isArray(data.patients)||!Array.isArray(data.appointments)) throw new Error('invalid');
        const msg=`${data.patients.length} hasta, ${(data.procedures||[]).length} işlem ve ${data.appointments.length} randevu yüklenecek.\nMevcut hasta, işlem ve randevu verileri silinecek. Emin misiniz?`;
        if(!confirm(msg)) return;
        db.patients=data.patients;
        db.procedures=data.procedures||[];
        db.appointments=data.appointments;
        saveDB('patients'); saveDB('procedures'); saveDB('appointments');
        showToast('✓ Hasta & Ajanda verileri yüklendi');
        renderMaliyetYedek();
      }catch(err){ showToast('Hata: Geçersiz yedek dosyası'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ==================== MODALS ====================
function openModal(id){
  closeAllPopups();
  document.getElementById(id).classList.add('open');
}

function closeModal(id){
  document.getElementById(id).classList.remove('open');
}

// Close modal on backdrop click
document.querySelectorAll('.overlay').forEach(ov=>{
  ov.addEventListener('click',function(e){
    if(e.target===this) this.classList.remove('open');
  });
});

function closeAllPopups(){
  document.querySelectorAll('.popup').forEach(p=>p.remove());
}

// ==================== UTILITIES ====================
function formatDate(ds){
  if(!ds) return '—';
  try{
    const d=new Date(ds+'T12:00:00');
    return d.getDate()+' '+TR_MONTHS[d.getMonth()]+' '+d.getFullYear();
  }catch(e){return ds;}
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ==================== MIGRATION ====================
function migrateDB(){
  let changed=false;
  // Rename CaHa → Monaco Touch
  db.products.forEach(p=>{if((p.id==='caha'||p.name==='CaHa')&&p.name!=='Monaco Touch'){p.name='Monaco Touch';changed=true;}});
  // Add missing products
  [
    {id:'crystal',name:'Crystal',cat:'mezoterapi-yuz',unit:'adet',price:0},
    {id:'prp-yuz',name:'PRP',cat:'mezoterapi-yuz',unit:'adet',price:0},
    {id:'prf-yuz',name:'PRF',cat:'mezoterapi-yuz',unit:'adet',price:0},
    {id:'prp-sac',name:'PRP',cat:'mezoterapi-sac',unit:'adet',price:0},
    {id:'prf-sac',name:'PRF',cat:'mezoterapi-sac',unit:'adet',price:0},
    {id:'collagen-booster',name:'Collagen Booster',cat:'iv',unit:'adet',price:0},
    {id:'voleria-mid',name:'Voleria Mid',cat:'dolgu',unit:'cc',price:0}
  ].forEach(p=>{if(!db.products.find(x=>x.id===p.id)){db.products.push({...p});changed=true;}});
  // Dolgu subs migration
  const dolguCat=db.cats.find(c=>c.id==='dolgu');
  if(dolguCat&&(!dolguCat.subs||dolguCat.subs.length===0)){
    dolguCat.subs=['Dudak','Zigoma','Temporal','Göz Altı','Nazolabial','Çene','Jawline','Burun','Fullface'];
    dolguCat.direct=false;
    saveDB('cats');
  }
  if(changed) saveDB('products');
}
